<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Aggiornamento</title>
    <style>
        /* Reset e Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            overflow: hidden;
            padding: 20px;
        }

        /* Container Principale */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }

        /* Icona Animata */
        .icon-box {
            margin-bottom: 30px;
        }

        .gear-icon {
            width: 80px;
            height: 80px;
            fill: #fff;
            animation: rotate 4s linear infinite;
        }

        /* Testi */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Barra di Progresso (Estetica) */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 10px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            width: 75%; /* Percentuale di completamento manuale */
            height: 100%;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        /* Contatti e Social */
        .footer {
            font-size: 0.9rem;
        }

        .contact-link {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            border-bottom-style: solid;
            opacity: 0.8;
        }

        /* Animazioni */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Media Query per Mobile */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <!-- SVG Gear Icon -->
            <svg class="gear-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.39,0.12-0.59l-1.92-3.32c-0.12-0.2-0.36-0.27-0.57-0.19l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.22-0.24-0.39-0.48-0.39h-3.84c-0.24,0-0.43,0.17-0.48,0.39L9.25,5.36c-0.59,0.24-1.13,0.56-1.62,0.94l-2.39-0.96c-0.22-0.08-0.45,0-0.57,0.19L2.75,8.86c-0.11,0.21-0.06,0.45,0.12,0.59l2.03,1.58C4.86,11.33,4.84,11.63,4.84,12c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.39-0.12,0.59l1.92,3.32c0.12,0.2,0.36,0.27,0.57,0.19l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.22,0.24,0.39,0.48,0.39h3.84c0.24,0,0.43-0.17,0.48-0.39l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.45,0,0.57-0.19l1.92-3.32c0.11-0.21,0.06-0.45-0.12-0.59L19.14,12.94z M12,15.5c-1.93,0-3.5-1.57-3.5-3.5s1.57-3.5,3.5-3.5s3.5,1.57,3.5,3.5S13.93,15.5,12,15.5z"/>
            </svg>
        </div>

        <h1>Stiamo lavorando per voi</h1>
        <p>
            Il nostro sito è attualmente in fase di manutenzione per migliorare la tua esperienza. 
            Torneremo online tra pochissimo con grandi novità!
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="footer">
            Hai bisogno di assistenza urgente? <br>
            Scrivici a: <a href="mailto:info@scuolapraticanutrizione.it" class="contact-link">info@scuolapraticanutrizione.it</a>
        </div>
    </div>

</body>
</html>
